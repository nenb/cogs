name: KVM qualification

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  pull_request:
    types: [labeled, reopened, synchronize]

permissions:
  contents: read

jobs:
  linux-kvm:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'security')
    runs-on: ubuntu-24.04
    concurrency:
      group: kvm-qualification-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked JavaScript dependencies
        run: npm ci --ignore-scripts

      - name: Install KVM qualification prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends busybox-static cpio file linux-image-virtual qemu-system-x86
          sudo chmod 0660 /dev/kvm
          sudo chgrp "$(id -gn)" /dev/kvm

      - name: Prove active KVM acceleration with a root guest
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: dev/linux-kvm/qualify.sh docs/security-evidence/generated/kvm-qualification.json

      - name: Validate applicability-aware report
        if: always()
        run: npm run schemas -- docs/security-evidence/generated/kvm-qualification.json

      - name: Upload qualification evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kvm-qualification-${{ github.run_id }}-${{ github.run_attempt }}
          path: docs/security-evidence/generated/
          if-no-files-found: error
          retention-days: 30

name: KVM qualification

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  pull_request:
    types: [labeled, reopened, synchronize]

permissions:
  contents: read

jobs:
  linux-kvm:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'security')
    runs-on: ubuntu-24.04
    concurrency:
      group: kvm-qualification-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    timeout-minutes: 55
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked JavaScript dependencies
        run: npm ci --ignore-scripts

      - name: Install KVM qualification prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            busybox-static cloud-image-utils cpio curl e2fsprogs file iptables linux-image-virtual \
            openssh-client qemu-system-x86 qemu-utils socat
          sudo chmod 0660 /dev/kvm
          sudo chgrp "$(id -gn)" /dev/kvm

      - name: Prove active KVM acceleration with a root guest
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: dev/linux-kvm/qualify.sh docs/security-evidence/generated/kvm-qualification.json

      - name: Exercise the isolated Debian guest lifecycle
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: dev/linux-kvm/ci-smoke.sh docs/security-evidence/generated/kvm-driver-smoke.json

      - name: Create persistent isolated guest for authoritative conformance
        id: guest
        run: dev/linux-kvm/driver.sh create

      - name: Run authoritative Stage 1 suite against Envoy
        id: envoy_suite
        continue-on-error: true
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
          COGS_CONFORMANCE_PROFILE: linux-kvm
        run: npx --no-install tsx test/egress-conformance/proxy-adapters/envoy/suite-smoke.ts docs/security-evidence/generated/envoy-kvm

      - name: Run real Stage 3 runtime manager through KVM guest
        id: real_runtime_kvm
        continue-on-error: true
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
          COGS_STAGE3_REAL_RUNTIME_PROFILE: linux-kvm
        run: test/egress-conformance/stage3-real-runtime/ci-smoke.sh docs/security-evidence/generated/stage3-real-runtime-kvm

      - name: Destroy isolated conformance guest
        id: destroy
        if: always() && steps.guest.outcome != 'skipped'
        run: dev/linux-kvm/driver.sh destroy

      - name: Prepare exact pinned launcher images
        id: launcher_images
        if: always() && steps.destroy.outcome == 'success'
        run: npx --no-install tsx scripts/prepare-launcher-images.ts

      - name: Provision explicit launcher tmpfs roots
        id: launcher_roots
        if: always() && steps.launcher_images.outcome == 'success'
        run: |
          set -euo pipefail
          sudo mkdir -p /run/cogs/egress /run/cogs/ssh
          sudo mount -t tmpfs -o "size=16m,mode=0700,uid=$(id -u),gid=$(id -g)" tmpfs /run/cogs/egress
          sudo mount -t tmpfs -o "size=16m,mode=0700,uid=$(id -u),gid=$(id -g)" tmpfs /run/cogs/ssh
          test "$(find /run/cogs/egress /run/cogs/ssh -mindepth 1 -maxdepth 1 | wc -l)" = 0

      - name: Run integrated Stage 3 S3-09 launcher evidence
        id: launcher_s309
        if: always() && steps.launcher_roots.outcome == 'success'
        continue-on-error: true
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: >-
          npx --no-install tsx scripts/run-launcher-smoke-evidence.ts
          --profile linux-kvm
          --state s309-${{ github.run_id }}-${{ github.run_attempt }}
          --timeout-ms 600000
          --scenario s3-09
          --report docs/security-evidence/generated/launcher-s3-09-linux-kvm.json

      - name: Run development launcher linux-kvm smoke
        id: launcher_smoke
        if: always() && steps.launcher_roots.outcome == 'success'
        continue-on-error: true
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: >-
          npx --no-install tsx scripts/run-launcher-smoke-evidence.ts
          --profile linux-kvm
          --state kvm-${{ github.run_id }}-${{ github.run_attempt }}
          --timeout-ms 600000
          --report docs/security-evidence/generated/launcher-linux-kvm.json

      - name: Unmount explicit launcher tmpfs roots
        id: launcher_roots_cleanup
        if: always() && steps.launcher_roots.outcome != 'skipped'
        run: |
          set -euo pipefail
          for root in /run/cogs/ssh /run/cogs/egress; do
            test -d "$root"
            test "$(realpath "$root")" = "$root"
            test "$(find "$root" -mindepth 1 -maxdepth 1 | wc -l)" = 0
            mountpoint -q "$root"
            sudo umount "$root"
            ! mountpoint -q "$root"
          done
          sudo rmdir /run/cogs/ssh /run/cogs/egress /run/cogs

      - name: Validate applicability-aware reports
        id: evidence
        if: always()
        run: |
          npm run schemas -- \
            docs/security-evidence/generated/kvm-qualification.json \
            docs/security-evidence/generated/kvm-driver-smoke.json \
            docs/security-evidence/generated/envoy-kvm/envoy-suite-linux-kvm-*/report.json \
            docs/security-evidence/generated/stage3-real-runtime-kvm/stage3-real-runtime-linux-kvm-*/report.json \
            docs/security-evidence/generated/launcher-linux-kvm.json \
            docs/security-evidence/generated/launcher-s3-09-linux-kvm.json
          shopt -s nullglob
          sidecars=(docs/security-evidence/generated/stage3-real-runtime-kvm/stage3-real-runtime-linux-kvm-*/stage3-real-runtime-sidecar.json)
          test "${#sidecars[@]}" -eq 1
          npx --no-install tsx scripts/validate-stage3-real-runtime-sidecars.ts "${sidecars[0]}"

      - name: Upload qualification evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kvm-qualification-${{ github.run_id }}-${{ github.run_attempt }}
          path: docs/security-evidence/generated/
          if-no-files-found: error
          retention-days: 30

      - name: Enforce authoritative conformance after evidence publication
        if: always()
        env:
          ENVOY_OUTCOME: ${{ steps.envoy_suite.outcome }}
          REAL_RUNTIME_KVM_OUTCOME: ${{ steps.real_runtime_kvm.outcome }}
          DESTROY_OUTCOME: ${{ steps.destroy.outcome }}
          EVIDENCE_OUTCOME: ${{ steps.evidence.outcome }}
          LAUNCHER_IMAGES_OUTCOME: ${{ steps.launcher_images.outcome }}
          LAUNCHER_SMOKE_OUTCOME: ${{ steps.launcher_smoke.outcome }}
          LAUNCHER_S309_OUTCOME: ${{ steps.launcher_s309.outcome }}
          LAUNCHER_ROOTS_CLEANUP_OUTCOME: ${{ steps.launcher_roots_cleanup.outcome }}
        run: |
          test "$ENVOY_OUTCOME" = success
          test "$REAL_RUNTIME_KVM_OUTCOME" = success
          test "$DESTROY_OUTCOME" = success
          test "$LAUNCHER_IMAGES_OUTCOME" = success
          test "$LAUNCHER_SMOKE_OUTCOME" = success
          test "$LAUNCHER_S309_OUTCOME" = success
          test "$LAUNCHER_ROOTS_CLEANUP_OUTCOME" = success
          test "$EVIDENCE_OUTCOME" = success

name: Insecure container smoke

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  insecure-container:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'security')
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    concurrency:
      group: insecure-container-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked JavaScript dependencies
        run: npm ci --ignore-scripts

      - name: Build and verify the non-authoritative SSH/SFTP driver
        id: smoke
        continue-on-error: true
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: dev/insecure-sandbox/ci-smoke.sh docs/security-evidence/generated/insecure-container-smoke.json

      - name: Run pinned Envoy functional conformance
        id: envoy
        continue-on-error: true
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: npx --no-install tsx test/egress-conformance/proxy-adapters/envoy/ci-smoke.ts docs/security-evidence/generated/envoy

      - name: Run shared Stage 1 suite against Envoy
        id: envoy_suite
        continue-on-error: true
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: npx --no-install tsx test/egress-conformance/proxy-adapters/envoy/suite-smoke.ts docs/security-evidence/generated/envoy-suite

      - name: Run functional-only OpenBao model-auth smoke
        id: openbao_model_auth
        continue-on-error: true
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: dev/openbao-model-auth/ci-smoke.sh docs/security-evidence/generated/openbao-model-auth

      - name: Run real Stage 3 runtime manager functional smoke
        id: real_runtime
        continue-on-error: true
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: test/egress-conformance/stage3-real-runtime/ci-smoke.sh docs/security-evidence/generated/stage3-real-runtime

      - name: Provision explicit launcher tmpfs roots
        id: launcher_roots
        run: |
          set -euo pipefail
          sudo mkdir -p /run/cogs/egress /run/cogs/ssh
          sudo mount -t tmpfs -o "size=16m,mode=0700,uid=$(id -u),gid=$(id -g)" tmpfs /run/cogs/egress
          sudo mount -t tmpfs -o "size=16m,mode=0700,uid=$(id -u),gid=$(id -g)" tmpfs /run/cogs/ssh
          test "$(find /run/cogs/egress /run/cogs/ssh -mindepth 1 -maxdepth 1 | wc -l)" = 0

      - name: Run development launcher insecure-container smoke
        id: launcher_smoke
        continue-on-error: true
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: >-
          npx --no-install tsx scripts/run-launcher-smoke-evidence.ts
          --profile insecure-container
          --state insecure-${{ github.run_id }}-${{ github.run_attempt }}
          --timeout-ms 600000
          --report docs/security-evidence/generated/launcher-insecure-container.json

      - name: Unmount explicit launcher tmpfs roots
        id: launcher_roots_cleanup
        if: always() && steps.launcher_roots.outcome != 'skipped'
        run: |
          set -euo pipefail
          for root in /run/cogs/ssh /run/cogs/egress; do
            test -d "$root"
            test "$(realpath "$root")" = "$root"
            test "$(find "$root" -mindepth 1 -maxdepth 1 | wc -l)" = 0
            mountpoint -q "$root"
            sudo umount "$root"
            ! mountpoint -q "$root"
          done
          sudo rmdir /run/cogs/ssh /run/cogs/egress /run/cogs

      - name: Validate functional-only evidence
        id: evidence
        if: always()
        run: |
          npm run schemas -- \
            docs/security-evidence/generated/insecure-container-smoke.json \
            docs/security-evidence/generated/envoy/envoy-candidate-*/report.json \
            docs/security-evidence/generated/envoy-suite/envoy-suite-*/report.json \
            docs/security-evidence/generated/openbao-model-auth/report.json \
            docs/security-evidence/generated/stage3-real-runtime/stage3-real-runtime-*/report.json \
            docs/security-evidence/generated/launcher-insecure-container.json

      - name: Upload validated insecure-container evidence
        if: always() && steps.evidence.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: insecure-container-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            docs/security-evidence/generated/insecure-container-smoke.json
            docs/security-evidence/generated/envoy/
            docs/security-evidence/generated/envoy-suite/
            docs/security-evidence/generated/openbao-model-auth/
            docs/security-evidence/generated/stage3-real-runtime/
            docs/security-evidence/generated/launcher-insecure-container.json
          if-no-files-found: error
          retention-days: 30

      - name: Enforce smoke result after evidence publication
        if: always()
        env:
          DRIVER_OUTCOME: ${{ steps.smoke.outcome }}
          ENVOY_OUTCOME: ${{ steps.envoy.outcome }}
          ENVOY_SUITE_OUTCOME: ${{ steps.envoy_suite.outcome }}
          OPENBAO_MODEL_AUTH_OUTCOME: ${{ steps.openbao_model_auth.outcome }}
          REAL_RUNTIME_OUTCOME: ${{ steps.real_runtime.outcome }}
          LAUNCHER_SMOKE_OUTCOME: ${{ steps.launcher_smoke.outcome }}
          LAUNCHER_ROOTS_CLEANUP_OUTCOME: ${{ steps.launcher_roots_cleanup.outcome }}
        run: |
          test "$DRIVER_OUTCOME" = success
          test "$ENVOY_OUTCOME" = success
          test "$ENVOY_SUITE_OUTCOME" = success
          test "$OPENBAO_MODEL_AUTH_OUTCOME" = success
          test "$REAL_RUNTIME_OUTCOME" = success
          test "$LAUNCHER_SMOKE_OUTCOME" = success
          test "$LAUNCHER_ROOTS_CLEANUP_OUTCOME" = success

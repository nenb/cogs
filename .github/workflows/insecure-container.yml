name: Insecure container smoke

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  insecure-container:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'security')
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    concurrency:
      group: insecure-container-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked JavaScript dependencies
        run: npm ci --ignore-scripts

      - name: Build and verify the non-authoritative SSH/SFTP driver
        id: smoke
        continue-on-error: true
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: dev/insecure-sandbox/ci-smoke.sh docs/security-evidence/generated/insecure-container-smoke.json

      - name: Run pinned Envoy functional conformance
        id: envoy
        continue-on-error: true
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: npx --no-install tsx test/egress-conformance/proxy-adapters/envoy/ci-smoke.ts docs/security-evidence/generated/envoy

      - name: Run pinned mitmproxy functional conformance
        id: mitmproxy
        continue-on-error: true
        env:
          COGS_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: npx --no-install tsx test/egress-conformance/proxy-adapters/mitmproxy/ci-smoke.ts docs/security-evidence/generated/mitmproxy

      - name: Validate functional-only evidence
        id: evidence
        if: always()
        run: |
          npm run schemas -- \
            docs/security-evidence/generated/insecure-container-smoke.json \
            docs/security-evidence/generated/envoy/envoy-candidate-*/report.json \
            docs/security-evidence/generated/mitmproxy/mitmproxy-candidate-*/report.json

      - name: Upload validated insecure-container evidence
        if: always() && steps.evidence.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: insecure-container-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            docs/security-evidence/generated/insecure-container-smoke.json
            docs/security-evidence/generated/envoy/
            docs/security-evidence/generated/mitmproxy/
          if-no-files-found: error
          retention-days: 30

      - name: Enforce smoke result after evidence publication
        if: always()
        env:
          DRIVER_OUTCOME: ${{ steps.smoke.outcome }}
          ENVOY_OUTCOME: ${{ steps.envoy.outcome }}
          MITMPROXY_OUTCOME: ${{ steps.mitmproxy.outcome }}
        run: |
          test "$DRIVER_OUTCOME" = success
          test "$ENVOY_OUTCOME" = success
          test "$MITMPROXY_OUTCOME" = success

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and Pi embedding
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Go for the static guest probe
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: test/egress-conformance/guest-probes/go.mod
          cache: false

      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Format and lint
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit, hostile-canary, fake-model, and JSONL tests
        env:
          PI_OFFLINE: "1"
          PI_TELEMETRY: "0"
          PI_SKIP_VERSION_CHECK: "1"
        run: npm test

      - name: Test and reproducibly build the static guest probe
        run: |
          cd test/egress-conformance/guest-probes
          python3 -c 'compile(open("black-box-probe.py", encoding="utf-8").read(), "black-box-probe.py", "exec")'
          bash -n run-black-box-case.sh run-kvm-black-box-case.sh
          go test ./...
          ./build.sh "$RUNNER_TEMP/probe-a"
          ./build.sh "$RUNNER_TEMP/probe-b"
          (cd "$RUNNER_TEMP/probe-a" && sha256sum --check cogs-net-probe-linux-amd64.sha256)
          (cd "$RUNNER_TEMP/probe-b" && sha256sum --check cogs-net-probe-linux-amd64.sha256)
          cmp "$RUNNER_TEMP/probe-a/cogs-net-probe-linux-amd64" "$RUNNER_TEMP/probe-b/cogs-net-probe-linux-amd64"
          cmp "$RUNNER_TEMP/probe-a/cogs-net-probe-linux-amd64.sha256" "$RUNNER_TEMP/probe-b/cogs-net-probe-linux-amd64.sha256"
          cmp "$RUNNER_TEMP/probe-a/cogs-net-probe-linux-amd64.build.json" "$RUNNER_TEMP/probe-b/cogs-net-probe-linux-amd64.build.json"
          file "$RUNNER_TEMP/probe-a/cogs-net-probe-linux-amd64" | grep -F 'statically linked'
          ! readelf --program-headers "$RUNNER_TEMP/probe-a/cogs-net-probe-linux-amd64" | grep -F INTERP
          ! readelf --dynamic "$RUNNER_TEMP/probe-a/cogs-net-probe-linux-amd64" | grep -F NEEDED
          canary='must-never-be-reflected-7f4d4a9f'
          output=$(printf '{"version":"cogs.guest-probe/v1alpha1","operation":"http","url":"https://127.0.0.1:1/private?value=%s","headers":{"Authorization":"Bearer %s"},"timeout_ms":100}' "$canary" "$canary" | "$RUNNER_TEMP/probe-a/cogs-net-probe-linux-amd64" 2>"$RUNNER_TEMP/probe-stderr")
          ! grep -F "$canary" <<<"$output"
          test ! -s "$RUNNER_TEMP/probe-stderr"

      - name: Validate schemas and report semantics
        run: npm run schemas

      - name: Verify base-image digest pins
        run: npm run images:check

      - name: Verify registry dependency integrity
        run: npm run lock:check

      - name: Enforce production dependency license policy
        run: npm run licenses

      - name: Audit dependencies
        run: npm run audit

      - name: Validate the non-deploying AWS feasibility fixture
        run: ./deploy/aws-feasibility/validate.sh

      - name: Lint and render the non-deploying Helm scaffold
        run: |
          helm lint deploy/helm/cogs
          test -z "$(helm template cogs deploy/helm/cogs)"

      - name: Upload validated guest probe, digest, and build manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cogs-net-probe-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/probe-a/
          if-no-files-found: error
          retention-days: 7

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  images:
    name: Images, vulnerabilities, and SBOMs
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      ENVOY_IMAGE: envoyproxy/envoy:v1.38.3@sha256:5f7c43e1147412fdb3af578c651c67478a3df818eae89d2261e707e06c209cdb
      MITMPROXY_IMAGE: mitmproxy/mitmproxy:12.2.3@sha256:00b77b5d8804c8ad18cb6caefbf9d5849e895e8986c5ce011f4ae30f4385962f
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build worker scaffold
        run: docker build --pull=false --tag cogs-worker:ci --file images/worker/Dockerfile .

      - name: Build sandbox scaffold
        run: docker build --pull=false --tag cogs-sandbox:ci --file images/sandbox/Dockerfile .

      - name: Build insecure-container test driver
        run: docker build --pull=false --tag cogs-insecure-sandbox:ci --file dev/insecure-sandbox/Dockerfile .

      - name: Pull pinned proxy candidates
        run: |
          docker pull "$ENVOY_IMAGE"
          docker pull "$MITMPROXY_IMAGE"

      - name: Scan worker image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: cogs-worker:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Scan sandbox image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: cogs-sandbox:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Scan insecure-container test driver
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: cogs-insecure-sandbox:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Scan pinned Envoy candidate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.ENVOY_IMAGE }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Inventory mitmproxy candidate findings without suppression
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.MITMPROXY_IMAGE }}
          format: json
          output: mitmproxy-vulnerabilities.json
          exit-code: "0"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Scan pinned mitmproxy candidate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.MITMPROXY_IMAGE }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore-mitmproxy

      - name: Generate worker SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: cogs-worker:ci
          format: spdx-json
          output-file: worker.spdx.json

      - name: Generate sandbox SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: cogs-sandbox:ci
          format: spdx-json
          output-file: sandbox.spdx.json

      - name: Generate insecure-container test-driver SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: cogs-insecure-sandbox:ci
          format: spdx-json
          output-file: insecure-container.spdx.json

      - name: Generate Envoy candidate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.ENVOY_IMAGE }}
          format: spdx-json
          output-file: envoy-candidate.spdx.json

      - name: Generate mitmproxy candidate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.MITMPROXY_IMAGE }}
          format: spdx-json
          output-file: mitmproxy-candidate.spdx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-sboms-${{ github.run_id }}
          path: |
            *.spdx.json
            mitmproxy-vulnerabilities.json
          if-no-files-found: error
          retention-days: 30
